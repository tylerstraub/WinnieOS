name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    # Only fire when something that actually affects the build changes —
    # README/DAD/CLAUDE edits don't churn Pages. workflow_dispatch below
    # is the manual escape hatch if a deploy is ever needed regardless.
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'config/default.json'
      - 'lib/config-loader.js'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt every bundled action into Node 24 ahead of GitHub's June 2026 forced
# upgrade — covers transitive deps (e.g. upload-artifact) that newer action
# majors don't expose directly.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build for Pages subpath
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
